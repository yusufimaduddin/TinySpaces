<!DOCTYPE html>
<html lang="id" x-data="themeConfig">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ @title }} - TinySpaces</title>
    <link rel="icon" type="image/png" href="/public/images/favicon.png">
    <meta name="title" content="{{ @title }}">
    <meta name="description" content="{{ @description }}">
    <meta name="author" content="{{ @author }}">
    <link href="/public/css/style.css" rel="stylesheet">
    <link href="/public/css/prose.css" rel="stylesheet">
    <link href="/node_modules/boxicons/css/boxicons.min.css" rel="stylesheet">
    <script src="/node_modules/alpinejs/dist/cdn.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/relativeTime.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/utc.js"></script>
    <script>
        dayjs.extend(window.dayjs_plugin_relativeTime);
        dayjs.extend(window.dayjs_plugin_utc);
    </script>
    <script>
        window.SPACE_ID = '{{ @space_id }}';
    </script>
    <script src="/public/js/app.js"></script>
    <script src="/public/js/space.js"></script>
</head>

<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100" x-data="spaceManager">
    <div class="min-h-screen">
        <!-- HEADER -->
        <header class="border-b border-gray-200 bg-white dark:bg-gray-800 dark:border-gray-700 relative z-10">
            <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">
                <a href="/user/dashboard">
                    <h1 class="text-lg font-semibold text-gray-900 dark:text-white cursor-pointer">
                        TinySpaces <span class="text-xs text-blue-700 dark:text-blue-400">REVIEW
                            MODE</span>
                    </h1>
                </a>

                <div class="flex items-center gap-4">
                    <!-- PROFILE -->
                    <div class="relative" x-data="{ profileDropdownOpen: false }">
                        <img @click="profileDropdownOpen = !profileDropdownOpen"
                            src="https://ui-avatars.com/api/?name={{ @username }}"
                            class="h-9 w-9 cursor-pointer rounded-full border-2 border-gray-200 dark:border-gray-700 hover:border-gray-300 dark:hover:border-gray-500 transition-colors" />
                        <div x-show="profileDropdownOpen" @click.outside="profileDropdownOpen = false" x-transition
                            class="absolute right-0 mt-3 w-56 rounded-xl border border-gray-200 bg-white dark:bg-gray-800 dark:border-gray-700 shadow-lg z-50">
                            <div class="border-b border-gray-100 dark:border-gray-700 px-4 py-3">
                                <p class="text-sm font-medium text-gray-900 dark:text-white">{{ @username }}</p>
                                <p class="text-xs text-gray-500 dark:text-gray-400">{{ @email }}</p>
                            </div>
                            <a href="/user/dashboard"
                                class="flex items-center gap-2 w-full px-4 py-2 text-left text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                                <i class='bx bx-home-alt'></i>
                                <span>Dashboard</span>
                            </a>
                            <button @click="toggleDarkMode()"
                                class="flex items-center gap-2 w-full px-4 py-2 text-left text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors cursor-pointer">
                                <i class='bx' :class="isDark ? 'bx-sun' : 'bx-moon'"></i>
                                <span x-text="isDark ? 'Light Mode' : 'Dark Mode'"></span>
                            </button>
                            <a href="/logout"
                                class="flex items-center gap-2 w-full px-4 py-2 text-left text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                                <i class='bx bx-log-out'></i>
                                <span>Logout</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-6xl mx-auto py-8 px-4">
            <!-- Loading State -->
            <div x-show="loading" class="text-center py-12">
                <div class="inline-flex items-center gap-2">
                    <div class="w-2 h-2 bg-gray-900 dark:bg-white rounded-full animate-bounce"
                        style="animation-delay: 0s"></div>
                    <div class="w-2 h-2 bg-gray-900 dark:bg-white rounded-full animate-bounce"
                        style="animation-delay: 0.2s"></div>
                    <div class="w-2 h-2 bg-gray-900 dark:bg-white rounded-full animate-bounce"
                        style="animation-delay: 0.4s"></div>
                </div>
                <p class="mt-4 text-gray-600 dark:text-gray-400">Loading space data...</p>
            </div>

            <!-- SPACE DETAIL -->
            <section id="spaceDetail" x-show="!loading">
                <!-- Breadcrumb -->
                <div class="mb-6">
                    <nav class="flex items-center gap-2 text-sm">
                        <a href="/user/dashboard"
                            class="text-gray-600 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white">
                            Dashboard
                        </a>
                        <span class="text-gray-400 dark:text-gray-600">/</span>
                        <span class="font-medium text-gray-900 dark:text-white" x-text="space?.name || 'Space'"></span>
                    </nav>
                </div>

                <!-- Space Header -->
                <div class="mb-6 flex flex-col sm:flex-row sm:items-start sm:justify-between gap-4">
                    <div class="flex-1">
                        <div class="flex flex-col sm:flex-row sm:items-center gap-2 mb-3">
                            <i :class="space.class_icon || 'bx-folder'"
                                class="bx text-2xl text-gray-600 dark:text-gray-400"></i>
                            <h2 class="text-xl sm:text-2xl font-semibold text-gray-900 dark:text-white"
                                x-text="space?.name"></h2>
                        </div>
                        <p class="text-sm text-gray-600 dark:text-gray-400 mb-3"
                            x-text="space?.description || 'No description'"></p>
                        <!-- Status & Tags -->
                        <div class="flex flex-wrap sm:flex-row sm:items-center gap-3">
                            <span class="text-xs w-fit font-medium px-2 py-1 rounded capitalize" :class="{
                                        'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400': space.status === 'published',
                                        'bg-gray-200 text-gray-700 dark:bg-gray-700 dark:text-gray-300': space.status === 'private',
                                        'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/30 dark:text-yellow-400': space.status === 'archive'
                                    }" x-text="space.status">
                            </span>
                            <div class="flex items-center gap-2">
                                <span class="text-xs text-gray-500 dark:text-gray-400"
                                    x-text="'Updated ' + formatDate(space?.updated_at)"></span>
                            </div>

                            <!-- Tags -->
                            <div class="flex flex-wrap items-center gap-2">
                                <template x-for="tag in tags" :key="tag.id">
                                    <span
                                        class="rounded bg-gray-200 text-gray-700 dark:bg-gray-700 dark:text-gray-300 px-2 py-1 text-xs"
                                        x-text="tag.name"></span>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Files Table -->
                <div class="mb-8">
                    <div
                        class="rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 overflow-hidden">
                        <div class="border-b border-gray-200 dark:border-gray-700 px-4 py-3">
                            <h3 class="font-medium text-gray-900 dark:text-white">Files (<span
                                    x-text="files.length"></span>)</h3>
                        </div>

                        <div x-show="files.length === 0" class="p-6 text-center">
                            <p class="text-gray-500 dark:text-gray-400">No files uploaded yet</p>
                        </div>

                        <div class="overflow-x-auto" x-show="files.length > 0">
                            <table class="w-full text-sm">
                                <thead class="bg-gray-50 dark:bg-gray-900">
                                    <tr>
                                        <th class="p-3 text-left text-gray-700 dark:text-gray-300 w-full sm:w-auto">File
                                            Name</th>
                                        <th class="p-3 text-left text-gray-700 dark:text-gray-300 w-32">Size</th>
                                        <th class="p-3 text-left text-gray-700 dark:text-gray-300 w-40">Uploaded</th>
                                        <th class="p-3 text-left text-gray-700 dark:text-gray-300 w-48">Action</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="file in files" :key="file.id">
                                        <tr
                                            class="border-t border-gray-100 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/50">
                                            <td class="p-3">
                                                <div class="flex items-center gap-2">
                                                    <i class="bx bx-file text-gray-500 dark:text-gray-400"></i>
                                                    <span @click="viewFile(file.id)"
                                                        class="text-gray-700 dark:text-gray-300 hover:text-blue-800 dark:hover:text-blue-300 cursor-pointer text-nowrap"
                                                        x-text="file.original_name"></span>
                                                </div>
                                            </td>
                                            <td class="p-3 text-gray-600 dark:text-gray-300 text-nowrap"
                                                x-text="formatFileSize(file.file_size)">
                                            </td>
                                            <td class="p-3 text-gray-600 dark:text-gray-300 text-nowrap"
                                                x-text="formatDate(file.uploaded_at)"></td>
                                            <td class="p-3">
                                                <div class="flex gap-2">
                                                    <button @click="downloadFile(file.id, file.original_name)"
                                                        class="flex items-center gap-1 text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 cursor-pointer">
                                                        <i class="bx bx-download"></i>
                                                        <span>Download</span>
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- README.md Preview -->
                <div
                    class="rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 overflow-hidden">
                    <div
                        class="flex items-center justify-between border-b border-gray-200 dark:border-gray-700 px-4 py-3">
                        <div class="flex items-center gap-2">
                            <i class="bx bx-book text-gray-500 dark:text-gray-400"></i>
                            <h3 class="font-medium text-gray-900 dark:text-white">README.md</h3>
                        </div>
                    </div>
                    <div class="p-4 sm:p-6">
                        <div class="prose dark:prose-invert max-w-none">
                            <template x-if="readme.content">
                                <div class="md-display pb-4" x-html="marked.parse(readme.content)"></div>
                            </template>
                            <template x-if="!readme.content">
                                <p class="text-gray-500 dark:text-gray-400">No README content yet</p>
                            </template>
                            <div class="border-t border-gray-200 dark:border-gray-700 pt-4 mt-6">
                                <p class="text-sm text-gray-600 dark:text-gray-400"
                                    x-text="'Last updated: ' + formatDate(readme?.updated_at)"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Footer Note -->
            <div class="mt-8 text-center text-gray-500 dark:text-gray-400 text-sm">
                <p>&copy; 2026 TinySpaces. All rights reserved.</p>
            </div>
        </main>
    </div>

    <!-- TOAST COMPONENT -->
    <div x-data>
        <!-- Toast Display -->
        <div x-show="$store.toast.visible" style="display: none;" x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100 translate-y-0"
            x-transition:leave-end="opacity-0 translate-y-2"
            class="fixed top-6 right-6 flex items-center gap-2 rounded-xl border border-gray-200 bg-white dark:bg-gray-800 dark:border-gray-700 z-50 px-4 py-3 text-sm shadow-lg">
            <i :class="{
                'bx-check-circle text-green-600 dark:text-green-400': $store.toast.type === 'success',
                'bx-x-circle text-red-600 dark:text-red-400': $store.toast.type === 'error',
                'bx-info-circle text-blue-600 dark:text-blue-400': $store.toast.type === 'info'
            }" class="bx text-lg"></i>
            <span x-text="$store.toast.message" class="dark:text-gray-300"></span>
        </div>
    </div>
</body>

</html>
