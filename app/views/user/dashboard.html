<!DOCTYPE html>
<html lang="id" x-data="themeConfig">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ @title }} - TinySpaces</title>
    <link rel="icon" type="image/png" href="/public/images/favicon.png">
    <meta name="title" content="{{ @title }}">
    <meta name="description" content="{{ @description }}">
    <meta name="author" content="{{ @author }}">
    <link href="/public/css/style.css" rel="stylesheet">
    <link href="/node_modules/boxicons/css/boxicons.min.css" rel="stylesheet">
    <script src="/node_modules/alpinejs/dist/cdn.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/relativeTime.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/utc.js"></script>
    <script>
        dayjs.extend(window.dayjs_plugin_relativeTime);
        dayjs.extend(window.dayjs_plugin_utc);
    </script>
    <script src="/public/js/app.js"></script>
    <script>

        document.addEventListener('alpine:init', () => {
            Alpine.data('themeConfig', () => ({
                isDark: localStorage.getItem('theme') === 'dark',
                toggleDarkMode() {
                    this.isDark = !this.isDark;
                    localStorage.setItem('theme', this.isDark ? 'dark' : 'light');
                    this.updateTheme();
                },
                updateTheme() {
                    if (this.isDark) {
                        document.documentElement.classList.add('dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                    }
                },
                init() {
                    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                        this.isDark = true;
                    }
                    this.updateTheme();
                }
            }));

            Alpine.data('dashboardData', () => ({
                spaces: [],
                loading: true,
                currentFilter: 'all',
                searchQuery: '',
                searchTimeout: null,

                // Modal state
                modalOpen: false,
                formData: {
                    name: '',
                    description: '',
                    status: 'published',
                    class_icon: 'bx-folder'
                },

                async init() {
                    await this.loadSpaces();
                },

                async loadSpaces() {
                    this.loading = true;
                    try {
                        const params = new URLSearchParams();
                        if (this.currentFilter !== 'all') {
                            params.append('status', this.currentFilter);
                        }
                        if (this.searchQuery) {
                            params.append('search', this.searchQuery);
                        }

                        const response = await fetch(`/api/spaces?${params}`);
                        const data = await response.json();

                        if (data.success) {
                            this.spaces = data.spaces;
                        } else {
                            this.showToast(data.message || 'Failed to load spaces', 'error');
                        }
                    } catch (error) {
                        this.showToast('Error loading spaces', 'error');
                        console.error(error);
                    } finally {
                        this.loading = false;
                    }
                },

                setFilter(filter) {
                    this.currentFilter = filter;
                    this.loadSpaces();
                },

                onSearchInput() {
                    clearTimeout(this.searchTimeout);
                    this.searchTimeout = setTimeout(() => {
                        this.loadSpaces();
                    }, 300);
                },

                async createSpace() {
                    if (!this.formData.name.trim()) {
                        this.showToast('Space name is required', 'error');
                        return;
                    }

                    try {
                        const response = await fetch('/api/spaces', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.formData)
                        });

                        const data = await response.json();

                        if (data.success) {
                            this.showToast('Space created successfully!', 'success');
                            this.modalOpen = false;
                            this.resetForm();
                            await this.loadSpaces();
                        } else {
                            this.showToast(data.message || 'Failed to create space', 'error');
                        }
                    } catch (error) {
                        this.showToast('Error creating space', 'error');
                        console.error(error);
                    }
                },

                resetForm() {
                    this.formData = {
                        name: '',
                        description: '',
                        status: 'published',
                        class_icon: 'bx-folder'
                    };
                },

                formatTime(timestamp) {
                    if (!timestamp) return 'Recently';
                    try {
                        return dayjs.utc(timestamp).fromNow();
                    } catch (e) {
                        return 'Recently';
                    }
                },

                getTags(tagsString) {
                    if (!tagsString) return [];
                    return tagsString.split(',').filter(t => t.trim());
                },

                goToSpace(spaceId) {
                    window.location.href = `/user/space/${spaceId}`;
                },

                showToast(message, type = 'success') {
                    showAlpineToast(message, type);
                }
            }));
        });
    </script>
</head>

<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100">
    <div class="min-h-screen" x-data="dashboardData">
        <!-- HEADER -->
        <header class="border-b border-gray-200 bg-white dark:bg-gray-800 dark:border-gray-700 relative z-10">
            <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">
                <a href="/user/dashboard">
                    <h1 class="text-lg font-semibold text-gray-900 dark:text-white cursor-pointer">
                        TinySpaces
                    </h1>
                </a>

                <div class="flex items-center gap-4">
                    <button @click="modalOpen = true"
                        class="inline-flex items-center gap-2 rounded-lg bg-gray-900 dark:bg-gray-700 pr-4 pl-3 py-2 text-sm text-white dark:text-gray-100 hover:bg-gray-800 dark:hover:bg-gray-600 transition-colors cursor-pointer">
                        <i class="bx bx-plus text-lg"></i>
                        New Space
                    </button>

                    <!-- New Space Modal -->
                    <div x-show="modalOpen" style="display: none;" x-transition:enter="transition ease-out duration-200"
                        x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
                        x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100"
                        x-transition:leave-end="opacity-0"
                        class="fixed inset-0 bg-black/50 dark:bg-black/70 z-50 flex items-center justify-center p-4"
                        @click.self="handleBackdropDoubleTap(() => modalOpen = false)">

                        <div
                            class="bg-white dark:bg-gray-800 rounded-xl shadow-xl w-full max-w-md border border-gray-200 dark:border-gray-700">
                            <div class="p-6">
                                <div class="flex items-center justify-between mb-6">
                                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white">
                                        New Space
                                    </h3>
                                    <button @click="modalOpen = false"
                                        class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 cursor-pointer">
                                        <i class='bx bx-x text-2xl'></i>
                                    </button>
                                </div>

                                <div class="mb-6 space-y-4">
                                    <div>
                                        <label
                                            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Space
                                            Name</label>
                                        <input type="text" x-model="formData.name"
                                            class="w-full rounded-lg border border-gray-300 dark:border-gray-700 px-4 py-2.5 text-sm bg-white dark:bg-gray-900 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                            placeholder="Enter space name">
                                    </div>

                                    <div>
                                        <label
                                            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Description</label>
                                        <textarea x-model="formData.description" rows="3"
                                            class="w-full rounded-lg border border-gray-300 dark:border-gray-700 px-4 py-2.5 text-sm bg-white dark:bg-gray-900 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                            placeholder="Enter space description"></textarea>
                                    </div>

                                    <div>
                                        <label
                                            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Status</label>
                                        <select x-model="formData.status"
                                            class="w-full rounded-lg border border-gray-300 dark:border-gray-700 px-4 py-2.5 text-sm bg-white dark:bg-gray-900 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                                            <option value="published" class="dark:bg-gray-800 bg-white">Published
                                            </option>
                                            <option value="private" class="dark:bg-gray-800 bg-white">Private</option>
                                            <option value="archive" class="dark:bg-gray-800 bg-white">Archive</option>
                                        </select>
                                    </div>

                                    <div>
                                        <label
                                            class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Icon
                                            class</label>
                                        <input type="text" x-model="formData.class_icon"
                                            class="w-full rounded-lg border border-gray-300 dark:border-gray-700 px-4 py-2.5 text-sm bg-white dark:bg-gray-900 text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                            placeholder="Enter icon class">
                                        <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">
                                            Icon documentation:
                                            <a class="underline text-blue-600 dark:text-blue-400 hover:no-underline"
                                                target="_blank" href="https://v2.boxicons.com/">
                                                https://v2.boxicons.com/
                                            </a>
                                        </p>
                                    </div>
                                </div>

                                <div class="pt-2 flex justify-end gap-3">
                                    <button @click="modalOpen = false"
                                        class="rounded-lg border border-gray-300 dark:border-gray-700 px-4 py-2.5 text-sm font-medium text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors cursor-pointer">
                                        Cancel
                                    </button>
                                    <button @click="createSpace()"
                                        class="rounded-lg bg-gray-900 dark:bg-gray-700 px-4 py-2.5 text-sm font-medium text-white dark:text-gray-100 hover:bg-gray-800 dark:hover:bg-gray-600 transition-colors cursor-pointer">
                                        Create
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- PROFILE -->
                    <div class="relative" x-data="{ open: false }">
                        <img @click="open = !open" src="https://ui-avatars.com/api/?name={{ @username }}"
                            class="h-9 w-9 cursor-pointer rounded-full border-2 border-gray-200 dark:border-gray-700 hover:border-gray-300 dark:hover:border-gray-500 transition-colors" />
                        <div x-show="open" @click.outside="open = false" x-transition
                            class="absolute right-0 mt-3 w-56 rounded-xl border border-gray-200 bg-white dark:bg-gray-800 dark:border-gray-700 shadow-lg z-50">
                            <div class="border-b border-gray-100 dark:border-gray-700 px-4 py-3">
                                <p class="text-sm font-medium text-gray-900 dark:text-white">{{ @username }}</p>
                                <p class="text-xs text-gray-500 dark:text-gray-400">{{ @SESSION.email }}</p>
                            </div>
                            <a href="/user/dashboard"
                                class="flex items-center gap-2 w-full px-4 py-2 text-left text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                                <i class='bx bx-home-alt'></i>
                                <span>Dashboard</span>
                            </a>
                            <a href="/user/profile"
                                class="flex items-center gap-2 w-full px-4 py-2 text-left text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                                <i class='bx bx-user'></i>
                                <span>Profile</span>
                            </a>
                            <button @click="toggleDarkMode()"
                                class="flex items-center gap-2 w-full px-4 py-2 text-left text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors cursor-pointer">
                                <i class='bx' :class="isDark ? 'bx-sun' : 'bx-moon'"></i>
                                <span x-text="isDark ? 'Light Mode' : 'Dark Mode'"></span>
                            </button>
                            <a href="/logout"
                                class="flex items-center gap-2 w-full px-4 py-2 text-left text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors">
                                <i class='bx bx-log-out'></i>
                                <span>Logout</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="max-w-6xl mx-auto py-8 px-4">
            <!-- DASHBOARD -->
            <section id="dashboard">
                <div class="mb-6">
                    <div
                        class="w-full md:w-80 flex items-center border border-gray-300 dark:border-gray-700 rounded-lg focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-blue-500 bg-white dark:bg-gray-800">
                        <div class="pl-3">
                            <i class="bx bx-search text-sm text-gray-500 dark:text-gray-400"></i>
                        </div>
                        <input type="text" placeholder="Search space..." x-model="searchQuery" @input="onSearchInput()"
                            class="flex-1 py-2 pr-3 ml-2 text-sm border-none focus:outline-none bg-transparent text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400" />
                    </div>
                </div>

                <div class="mb-6 flex gap-2">
                    <button @click="setFilter('all')"
                        :class="currentFilter === 'all' ? 'bg-gray-900 dark:bg-gray-700 text-white dark:text-gray-100' : 'border border-gray-300 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800'"
                        class="rounded-lg px-4 py-2 text-xs md:text-sm transition-colors cursor-pointer">
                        All
                    </button>
                    <button @click="setFilter('published')"
                        :class="currentFilter === 'published' ? 'bg-gray-900 dark:bg-gray-700 text-white dark:text-gray-100' : 'border border-gray-300 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800'"
                        class="rounded-lg px-4 py-2 text-xs md:text-sm transition-colors cursor-pointer">
                        Published
                    </button>
                    <button @click="setFilter('private')"
                        :class="currentFilter === 'private' ? 'bg-gray-900 dark:bg-gray-700 text-white dark:text-gray-100' : 'border border-gray-300 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800'"
                        class="rounded-lg px-4 py-2 text-xs md:text-sm transition-colors cursor-pointer">
                        Private
                    </button>
                    <button @click="setFilter('archive')"
                        :class="currentFilter === 'archive' ? 'bg-gray-900 dark:bg-gray-700 text-white dark:text-gray-100' : 'border border-gray-300 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-800'"
                        class="rounded-lg px-4 py-2 text-xs md:text-sm transition-colors cursor-pointer">
                        Archive
                    </button>
                </div>

                <!-- Loading State -->
                <div x-show="loading" class="text-center py-12">
                    <i class="bx bx-loader-alt bx-spin text-4xl text-gray-400"></i>
                    <p class="mt-2 text-gray-500 dark:text-gray-400">Loading spaces...</p>
                </div>

                <!-- Empty State -->
                <div x-show="!loading && spaces.length === 0" class="text-center py-12">
                    <i class="bx bx-folder-open text-6xl text-gray-300 dark:text-gray-600"></i>
                    <p class="mt-4 text-gray-500 dark:text-gray-400">No spaces found</p>
                    <button @click="modalOpen = true"
                        class="mt-4 text-blue-600 dark:text-blue-400 hover:underline cursor-pointer">
                        Create your first space
                    </button>
                </div>

                <!-- Spaces Grid -->
                <div x-show="!loading && spaces.length > 0" class="grid gap-5 sm:grid-cols-2 lg:grid-cols-3">
                    <template x-for="space in spaces" :key="space.id">
                        <div @click="goToSpace(space.id)"
                            class="cursor-pointer rounded-xl border border-gray-200 bg-white dark:bg-gray-800 dark:border-gray-700 p-5 transition hover:shadow-md hover:border-gray-300 dark:hover:shadow-gray-800/50 dark:hover:border-gray-600">

                            <!-- Header with icon and status -->
                            <div class="flex items-start justify-between mb-3">
                                <div class="flex items-center gap-3">
                                    <i :class="space.class_icon || 'bx-folder'"
                                        class="bx text-2xl text-gray-600 dark:text-gray-400"></i>
                                    <div>
                                        <h3 class="font-semibold text-gray-900 dark:text-white" x-text="space.name">
                                        </h3>
                                        <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
                                            <span x-text="formatTime(space.updated_at)"></span> •
                                            <span x-text="space.file_count || 0"></span> files
                                        </p>
                                    </div>
                                </div>
                                <span class="text-xs font-medium px-2 py-1 rounded capitalize" :class="{
                                        'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400': space.status === 'published',
                                        'bg-gray-200 text-gray-700 dark:bg-gray-700 dark:text-gray-300': space.status === 'private',
                                        'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/30 dark:text-yellow-400': space.status === 'archive'
                                    }" x-text="space.status">
                                </span>
                            </div>

                            <!-- Description -->
                            <p class="text-sm text-gray-600 dark:text-gray-400 mb-4 line-clamp-2"
                                x-text="space.description || 'No description'"></p>

                            <!-- Tags -->
                            <div class="flex flex-wrap gap-2" x-show="space.tags">
                                <template x-for="tag in getTags(space.tags)" :key="tag">
                                    <span
                                        class="rounded bg-gray-100 text-gray-700 dark:bg-gray-700 dark:text-gray-300 px-2 py-1 text-xs"
                                        x-text="tag"></span>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </section>

            <!-- Footer Note -->
            <div class="mt-8 text-center text-gray-500 dark:text-gray-400 text-sm">
                <p>&copy; 2026 TinySpaces. All rights reserved.</p>
            </div>
        </main>
    </div>

    <!-- TOAST COMPONENT -->
    <div x-data>
        <!-- Toast Display -->
        <div x-show="$store.toast.visible" style="display: none;" x-transition:enter="transition ease-out duration-300"
            x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100 translate-y-0"
            x-transition:leave-end="opacity-0 translate-y-2"
            class="fixed top-6 right-6 flex items-center gap-2 rounded-xl border border-gray-200 bg-white dark:bg-gray-800 dark:border-gray-700 z-50 px-4 py-3 text-sm shadow-lg">
            <i :class="{
                'bx-check-circle text-green-600 dark:text-green-400': $store.toast.type === 'success',
                'bx-x-circle text-red-600 dark:text-red-400': $store.toast.type === 'error',
                'bx-info-circle text-blue-600 dark:text-blue-400': $store.toast.type === 'info'
            }" class="bx text-lg"></i>
            <span x-text="$store.toast.message" class="dark:text-gray-300"></span>
        </div>
    </div>
</body>

</html>
