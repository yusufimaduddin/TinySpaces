<!DOCTYPE html>
<html lang="id" x-data="themeConfig">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ @title }} - TinySpaces</title>
    <meta name="title" content="TinySpaces">
    <meta name="description" content="TinySpaces is a free and open-source file hosting service.">
    <link rel="icon" type="image/png" href="/public/images/favicon.png">
    <link href="/public/css/style.css" rel="stylesheet">
    <link href="/node_modules/boxicons/css/boxicons.min.css" rel="stylesheet">
    <script src="/node_modules/alpinejs/dist/cdn.min.js" defer></script>
    <script src="/public/js/app.js"></script>
    <script>
        document.addEventListener('alpine:init', () => {
            Alpine.data('themeConfig', () => ({
                isDark: localStorage.getItem('theme') === 'dark',
                toggleDarkMode() {
                    this.isDark = !this.isDark;
                    localStorage.setItem('theme', this.isDark ? 'dark' : 'light');
                    this.updateTheme();
                },
                updateTheme() {
                    if (this.isDark) {
                        document.documentElement.classList.add('dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                    }
                },
                init() {
                    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                        this.isDark = true;
                    }
                    this.updateTheme();
                }
            }));
        });
    </script>
</head>

<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex items-center justify-center">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md">
            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold dark:text-white">TinySpaces</h1>
                <p class="text-gray-600 dark:text-gray-400 mt-2">Sign in to your account</p>
            </div>

            <!-- Login Card -->
            <div class="rounded-xl border bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-700 p-6 shadow-sm">
                <!-- Error Message (from login.html) -->
                <check if="{{ @error }}">
                    <div
                        class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-700 dark:text-red-300 px-4 py-3 rounded-lg mb-6 flex items-center">
                        <i class='bx bx-error-circle mr-2'></i>
                        <span>{{ @error }}</span>
                    </div>
                </check>

                <!-- Login Form (from login.html but with index.html styling) -->
                <form method="POST" action="/login" id="loginForm" onsubmit="handleLogin(event)" class="space-y-4">
                    <!-- Username/Email (from login.html) -->
                    <div>
                        <label for="username" class="block text-sm font-medium dark:text-gray-300 mb-1">
                            Username or Email
                        </label>
                        <div class="relative">
                            <i class='bx bx-user absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400'></i>
                            <input type="text" name="username" id="username" required
                                class="w-full pl-10 pr-3 py-3 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                placeholder="Enter username or email" value="admin">
                        </div>
                    </div>

                    <!-- Password (from login.html) -->
                    <div>
                        <label for="password" class="block text-sm font-medium dark:text-gray-300 mb-1">
                            Password
                        </label>
                        <div class="relative">
                            <i
                                class='bx bx-lock-alt absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400'></i>
                            <input type="password" name="password" id="password" required
                                class="w-full pl-10 pr-3 py-3 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                placeholder="Enter password" value="admin123">
                        </div>
                    </div>

                    <!-- Remember Me -->
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <input type="checkbox" id="remember" name="remember"
                                class="h-3 w-3 text-blue-600 focus:ring-blue-500 border-gray-300 dark:border-gray-600 dark:bg-gray-700 rounded cursor-pointer">
                            <label for="remember" class="ml-2 text-sm text-gray-700 dark:text-gray-300 cursor-pointer">
                                Remember me for 30 days
                            </label>
                        </div>
                    </div>

                    <!-- Login Button (from index.html) -->
                    <button type="submit"
                        class="w-full rounded-lg bg-black dark:bg-gray-700 px-4 py-3 text-sm font-medium text-white dark:text-gray-100 hover:bg-gray-800 dark:hover:bg-gray-600 transition-colors cursor-pointer">
                        Sign In
                    </button>
                </form>

                <!-- Demo Credentials -->
                <div class="mt-6 text-center">
                    <p class="text-xs text-gray-500 dark:text-gray-400">
                        <strong>Demo Accounts:</strong><br>
                        Admin: admin / admin123<br>
                    </p>
                </div>

            </div>

            <!-- Theme Toggle -->
            <div class="flex justify-center mt-4">
                <button @click="toggleDarkMode()"
                    class="flex items-center gap-2 text-sm text-gray-600 dark:text-gray-400 hover:text-gray-800 dark:hover:text-gray-300 cursor-pointer">
                    <i class='bx' :class="isDark ? 'bx-sun' : 'bx-moon'"></i>
                    <span x-text="isDark ? 'Light Mode' : 'Dark Mode'"></span>
                </button>
            </div>

            <!-- Footer -->
            <div class="mt-6 text-center">
                <p class="text-xs text-gray-500 dark:text-gray-400">
                    &copy; 2026 TinySpaces. All rights reserved.
                </p>
            </div>
        </div>
    </div>

</body>

</html>
